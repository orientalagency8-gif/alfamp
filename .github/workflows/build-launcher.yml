name: Build Launcher (Win MSI + NSIS)

on:
  push:
    branches: [main]
    paths:
      - 'launcher/**'
      - '.github/workflows/build-launcher.yml'
  workflow_dispatch: {}

permissions:
  contents: write   # to attach installers to Releases

jobs:
  build-windows:
    name: Build Windows installers
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: launcher

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: launcher/package-lock.json

      - name: Setup Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            launcher/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('launcher/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install npm deps
        run: npm install

      - name: Build (Tauri → MSI + NSIS)
        run: npm run tauri build

      - name: List artifacts
        if: always()
        shell: pwsh
        run: |
          $dir = "src-tauri/target/release/bundle"
          if (Test-Path $dir) { Get-ChildItem -Recurse $dir | Select-Object FullName, Length | Format-Table -Auto }
          else { Write-Host "no bundle dir" }

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: alfamp-launcher-msi-${{ github.run_number }}
          path: launcher/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: alfamp-launcher-nsis-${{ github.run_number }}
          path: launcher/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      # Future: attach to a GitHub Release on tagged push
      # - name: Publish to Release
      #   if: startsWith(github.ref, 'refs/tags/v')
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     files: |
      #       launcher/src-tauri/target/release/bundle/msi/*.msi
      #       launcher/src-tauri/target/release/bundle/nsis/*.exe
