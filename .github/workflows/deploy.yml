name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'master-server/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger deploy.sh on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          script: |
            set -e
            echo "[gh-actions] $(date -u +%FT%TZ) — triggered by ${{ github.event_name }}"
            echo "[gh-actions] commit: ${{ github.sha }}"
            /opt/alfamp/deploy.sh
            echo "[gh-actions] ✓ deploy completed"
