# Alfa MP — FXServer config (upstream, before our fork)
# Документация: https://docs.fivem.net/docs/server-manual/server-commands/

# === Сетевые настройки ===
endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

# === Основные ===
sv_hostname "Alfa MP — Upstream Test Server"
sv_maxclients 32
sv_projectName "Alfa MP"
sv_projectDesc "Alfa MP test deployment — upstream FXServer with our master-server heartbeat"

# === License key — нужен для запуска upstream FXServer ===
# Зарегистрируй на https://keymaster.fivem.net, ключ начинается с "cfxk_"
# Подставляется при docker compose через ${LICENSE_KEY}
sv_licenseKey "${LICENSE_KEY}"

# === Базовые ресурсы (минимум для запуска) ===
ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure hardcap
ensure rconlog
ensure scoreboard
ensure player-data

# === Игровой режим ===
set sv_enforceGameBuild 2944  # Свежий GTA V build на 2026-Q1 (актуальный)

# === Performance ===
set onesync on
sv_endpointPrivacy true

# === RCON (НЕ менять на public — это удалённый shell) ===
rcon_password "${RCON_PASSWORD}"
